name: Blue-Green Production Deploy

# 手动触发蓝绿发布；也可由 publish-image 成功后自动触发
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. sha-abc1234, latest)"
        required: true
        default: "latest"
      target_slot:
        description: "Deploy to slot (green / blue)"
        required: true
        default: "green"
        type: choice
        options: [green, blue]
      auto_switch:
        description: "Auto-switch traffic after health check passes"
        type: boolean
        default: true

  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  REGISTRY:    ghcr.io
  IMAGE_NAME:  ${{ github.repository }}
  NAMESPACE:   rag-enterprise

jobs:
  # ── 1. 确定发布参数 ───────────────────────────────────────────────────────────
  resolve-params:
    name: Resolve Deploy Parameters
    runs-on: ubuntu-latest
    outputs:
      image_tag:    ${{ steps.params.outputs.image_tag }}
      target_slot:  ${{ steps.params.outputs.target_slot }}
      active_slot:  ${{ steps.params.outputs.active_slot }}
      standby_slot: ${{ steps.params.outputs.standby_slot }}
      auto_switch:  ${{ steps.params.outputs.auto_switch }}
    steps:
      - name: Resolve parameters
        id: params
        run: |
          # workflow_dispatch 优先；workflow_run 时用 sha-<commit>
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
            SLOT="${{ github.event.inputs.target_slot }}"
            AUTO="${{ github.event.inputs.auto_switch }}"
          else
            TAG="sha-${{ github.sha }}"
            SLOT="green"
            AUTO="true"
          fi
          echo "image_tag=$TAG"      >> "$GITHUB_OUTPUT"
          echo "target_slot=$SLOT"   >> "$GITHUB_OUTPUT"
          echo "auto_switch=$AUTO"   >> "$GITHUB_OUTPUT"
          # 当前活跃槽位的反面就是待机槽位
          if [ "$SLOT" = "green" ]; then
            echo "active_slot=blue"    >> "$GITHUB_OUTPUT"
            echo "standby_slot=green"  >> "$GITHUB_OUTPUT"
          else
            echo "active_slot=green"   >> "$GITHUB_OUTPUT"
            echo "standby_slot=blue"   >> "$GITHUB_OUTPUT"
          fi

  # ── 2. 部署到待机槽位 ─────────────────────────────────────────────────────────
  deploy-standby:
    name: Deploy to ${{ needs.resolve-params.outputs.target_slot }} slot
    runs-on: ubuntu-latest
    needs: resolve-params
    environment:
      name: production
      url: https://rag.yourdomain.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (production)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update image tag in standby deployment
        env:
          SLOT:  ${{ needs.resolve-params.outputs.target_slot }}
          TAG:   ${{ needs.resolve-params.outputs.image_tag }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${TAG}"
          kubectl set image deployment/rag-api-${SLOT} \
            rag-api=${IMAGE} \
            -n ${{ env.NAMESPACE }}
          echo "Deployed ${IMAGE} to slot ${SLOT}"

      - name: Wait for standby rollout
        env:
          SLOT: ${{ needs.resolve-params.outputs.target_slot }}
        run: |
          kubectl rollout status deployment/rag-api-${SLOT} \
            -n ${{ env.NAMESPACE }} \
            --timeout=300s

      - name: Health-check standby slot (direct pod probe)
        env:
          SLOT: ${{ needs.resolve-params.outputs.target_slot }}
        run: |
          # 取一个 pod name，exec 内部健康检查，避免流量切换前暴露给用户
          POD=$(kubectl get pod -n ${{ env.NAMESPACE }} \
                  -l "app=rag-api,version=${SLOT}" \
                  -o jsonpath='{.items[0].metadata.name}')
          echo "Probing pod: $POD"
          kubectl exec -n ${{ env.NAMESPACE }} "$POD" -- \
            curl -sf http://localhost:8000/api/v1/health | jq .
          kubectl exec -n ${{ env.NAMESPACE }} "$POD" -- \
            curl -sf http://localhost:8000/api/v1/readiness | jq .

  # ── 3. 切换流量 ───────────────────────────────────────────────────────────────
  switch-traffic:
    name: Switch Traffic to ${{ needs.resolve-params.outputs.target_slot }}
    runs-on: ubuntu-latest
    needs: [resolve-params, deploy-standby]
    if: needs.resolve-params.outputs.auto_switch == 'true'
    environment:
      name: production
      url: https://rag.yourdomain.com
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (production)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Patch service selector → standby slot
        env:
          SLOT: ${{ needs.resolve-params.outputs.target_slot }}
        run: |
          kubectl patch service rag-api-service \
            -n ${{ env.NAMESPACE }} \
            -p "{\"spec\":{\"selector\":{\"app\":\"rag-api\",\"version\":\"${SLOT}\"}}}"
          echo "Traffic now routes to slot: ${SLOT}"

      - name: Smoke test production endpoint
        run: |
          sleep 10   # 等 kube-proxy 更新 iptables
          PROD_URL="https://rag.yourdomain.com"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_URL/api/v1/health")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: got HTTP $STATUS, retrying in 10s..."
            sleep 10
          done
          echo "Smoke test failed — rolling back"
          exit 1

  # ── 4. 流量切换成功 → 监控等待 → 回收旧槽位 ──────────────────────────────────
  cleanup-old-slot:
    name: Cleanup ${{ needs.resolve-params.outputs.active_slot }} (old active)
    runs-on: ubuntu-latest
    needs: [resolve-params, switch-traffic]
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (production)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Scale down old slot (keep for fast rollback, don't delete)
        env:
          OLD_SLOT: ${{ needs.resolve-params.outputs.active_slot }}
        run: |
          # 缩容到 0 而非删除，保留快速回滚能力（5分钟窗口）
          kubectl scale deployment/rag-api-${OLD_SLOT} \
            --replicas=0 \
            -n ${{ env.NAMESPACE }}
          echo "Old slot ${OLD_SLOT} scaled to 0 replicas (kept for rollback)"

      - name: Post deployment summary
        env:
          NEW_SLOT: ${{ needs.resolve-params.outputs.target_slot }}
          OLD_SLOT: ${{ needs.resolve-params.outputs.active_slot }}
          TAG:      ${{ needs.resolve-params.outputs.image_tag }}
        run: |
          echo "### Blue-Green Deploy Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Active slot | **${NEW_SLOT}** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag   | \`${TAG}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Standby     | ${OLD_SLOT} (replicas=0, ready for rollback) |" >> "$GITHUB_STEP_SUMMARY"

  # ── 5. 紧急回滚（手动触发时可单独运行）─────────────────────────────────────────
  emergency-rollback:
    name: Emergency Rollback to ${{ needs.resolve-params.outputs.active_slot }}
    runs-on: ubuntu-latest
    needs: [resolve-params, switch-traffic]
    if: failure() && needs.switch-traffic.result == 'failure'
    environment:
      name: production
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (production)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Scale up old slot
        env:
          OLD_SLOT: ${{ needs.resolve-params.outputs.active_slot }}
        run: |
          kubectl scale deployment/rag-api-${OLD_SLOT} \
            --replicas=3 \
            -n ${{ env.NAMESPACE }}
          kubectl rollout status deployment/rag-api-${OLD_SLOT} \
            -n ${{ env.NAMESPACE }} --timeout=120s

      - name: Re-patch service → old slot
        env:
          OLD_SLOT: ${{ needs.resolve-params.outputs.active_slot }}
        run: |
          kubectl patch service rag-api-service \
            -n ${{ env.NAMESPACE }} \
            -p "{\"spec\":{\"selector\":{\"app\":\"rag-api\",\"version\":\"${OLD_SLOT}\"}}}"
          echo "ROLLBACK COMPLETE: traffic restored to ${OLD_SLOT}"
