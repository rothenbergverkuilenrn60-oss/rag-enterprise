name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy types-requests

      - name: Ruff lint
        run: ruff check . --select E,F,W,I --ignore E501

      - name: Mypy type check
        run: |
          mypy services/ utils/ config/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --python-version 3.11
        continue-on-error: true   # 类型检查失败不阻断，但显示警告

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --asyncio-mode=auto \
            --timeout=30 \
            --cov=services \
            --cov=utils \
            --cov-report=term-missing \
            --cov-fail-under=46 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: .coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run integration tests
        env:
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: development
        run: |
          pytest tests/integration/ \
            --asyncio-mode=auto \
            --timeout=60 \
            -v
        continue-on-error: true   # 集成测试依赖外部服务，允许失败但显示结果

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: |
          bandit -r services/ utils/ config/ \
            -ll \
            --skip B101,B601 \
            -f txt
        continue-on-error: true   # 安全扫描失败显示警告，不阻断合并

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --target runtime \
            -t rag-enterprise:ci-${{ github.sha }} \
            -f Dockerfile \
            .

      - name: Verify image starts
        run: |
          docker run --rm \
            -e ENVIRONMENT=development \
            -e LLM_PROVIDER=ollama \
            rag-enterprise:ci-${{ github.sha }} \
            python -c "from config.settings import settings; print('Settings OK')"

  # ── CD：推送镜像到 Registry（仅 main 分支）──────────────────────────────────
  publish-image:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [docker-build, unit-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=raw,value=stable

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v5
        with:
          context:   .
          file:      Dockerfile
          target:    runtime
          push:      true
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── CD：部署到 Staging K8s（仅 main 分支）────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: publish-image
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url:  https://rag-staging.yourdomain.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'

      - name: Configure kubeconfig (staging)
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Update image tag in deployment
        run: |
          kubectl set image deployment/rag-api \
            rag-api=ghcr.io/${{ github.repository }}:sha-${{ github.sha }} \
            -n rag-enterprise

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/rag-api -n rag-enterprise --timeout=300s

      - name: Smoke test staging
        run: |
          STAGING_URL="https://rag-staging.yourdomain.com"
          curl -f "$STAGING_URL/api/v1/health" || exit 1
          echo "Staging smoke test passed"

  # ── Eval Gate：RAGAS 质量门控（仅 main 分支 push）────────────────────────────
  eval-gate:
    name: RAGAS Eval Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install eval dependencies
        run: pip install -r requirements-eval.txt

      - name: Run RAGAS eval gate
        env:
          RAG_API_BASE_URL: ${{ secrets.RAG_API_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGAS_JUDGE_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RAGAS_JUDGE_MODEL: gpt-4o-mini
        run: python scripts/eval_ci_gate.py
