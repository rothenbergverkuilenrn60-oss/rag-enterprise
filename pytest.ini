[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
timeout = 60
log_cli = true
log_cli_level = INFO
markers =
    integration: integration tests requiring real external dependencies (e.g., paddleocr models, network)
    pgvector: integration tests requiring a live PostgreSQL + pgvector >= 0.8.0 instance
    real_llm: integration tests requiring a real LLM API key + quota (skipped in default CI; run nightly / pre-tag via `pytest -m real_llm`)
addopts = -m "not integration"
