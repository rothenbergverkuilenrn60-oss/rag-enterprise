apiVersion: v1
kind: Service
metadata:
  name: rag-api-service
  namespace: rag-enterprise
  labels:
    app: rag-api
spec:
  selector:
    app: rag-api            # 同时覆盖 blue 和 green（蓝绿切流靠此 selector）
  ports:
    - name:       http
      port:       80
      targetPort: 8000
      protocol:   TCP
  type: ClusterIP           # 仅集群内访问，外部流量经 Ingress
