# HorizontalPodAutoscaler：根据 CPU 和自定义指标自动扩缩容
# 需要集群安装 metrics-server：kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api-hpa
  namespace: rag-enterprise
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-api
  minReplicas: 2      # 最少2副本（保证高可用）
  maxReplicas: 10     # 最多10副本
  metrics:
    # CPU 使用率超过 60% 时扩容
    - type: Resource
      resource:
        name: cpu
        target:
          type:               AverageUtilization
          averageUtilization: 60
    # 内存使用率超过 75% 时扩容
    - type: Resource
      resource:
        name: memory
        target:
          type:               AverageUtilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # 扩容冷却 30 秒（快速响应流量峰值）
      policies:
        - type:          Pods
          value:         3              # 每次最多增加3个Pod
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # 缩容冷却 5 分钟（防止抖动）
      policies:
        - type:          Pods
          value:         1              # 每次最多减少1个Pod
          periodSeconds: 120
