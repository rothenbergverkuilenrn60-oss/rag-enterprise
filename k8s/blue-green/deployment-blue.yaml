# 蓝绿发布 — Blue（当前生产版本）
# 切流命令：kubectl patch service rag-api-service -n rag-enterprise \
#             -p '{"spec":{"selector":{"app":"rag-api","version":"blue"}}}'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api-blue
  namespace: rag-enterprise
  labels:
    app:     rag-api
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app:     rag-api
      version: blue
  template:
    metadata:
      labels:
        app:     rag-api
        version: blue
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: rag-api
          image: rag-enterprise:blue    # 生产镜像 tag
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits:   { cpu: "2000m", memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /api/v1/readiness, port: 8000 }
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: 8000 }
            initialDelaySeconds: 30
            periodSeconds: 15
