# docker/qdrant/config.yaml
# Qdrant 生产配置
service:
  http_port: 6333
  grpc_port: 6334
  max_request_size_mb: 64

storage:
  storage_path: /qdrant/storage
  on_disk_payload: true
  wal:
    wal_capacity_mb: 32
    wal_segments_ahead: 0
  performance:
    max_search_threads: 0       # auto = CPU 核数
    max_optimization_threads: 2

log_level: INFO
