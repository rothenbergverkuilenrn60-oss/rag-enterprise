# docker/redis/redis.conf
# Redis 生产配置

bind 0.0.0.0
port 6379
protected-mode yes

# 持久化（AOF + RDB 双模式）
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite no

# 内存策略（RAG 缓存场景：allkeys-lru）
maxmemory 512mb
maxmemory-policy allkeys-lru

# 连接
maxclients 1000
timeout 300
tcp-keepalive 60

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 日志
loglevel notice
