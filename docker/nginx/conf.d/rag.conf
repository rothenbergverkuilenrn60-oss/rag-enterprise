# docker/nginx/conf.d/rag.conf
# 负载均衡配置：支持 docker compose scale rag-api=N 水平扩容
#
# 使用方式：
#   启动3个实例：docker compose up --scale rag-api=3 -d
#   Nginx 自动将请求以 least_conn 策略分发到多个实例
#
# Docker 内部 DNS（127.0.0.11）每次解析 rag-api 返回所有实例 IP，
# resolver 指令让 Nginx 动态感知实例增减（valid=5s 缓存5秒）

# ── 负载均衡 upstream ────────────────────────────────────────────────────────
upstream rag_backend {
    least_conn;                         # 最少活跃连接策略（适合延迟差异大的 LLM 请求）
    server rag-api:8000 max_fails=3 fail_timeout=10s;   # 主节点
    keepalive 64;                       # 长连接复用（减少 TCP 握手开销）
    keepalive_requests 1000;            # 单连接最多复用 1000 次请求
    keepalive_timeout 60s;
}

# ── 主服务器块 ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    client_max_body_size 100m;
    proxy_read_timeout   300s;          # LLM 生成最长等待 5 分钟
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;

    # 限流（10r/s，突发允许 30 个排队）
    limit_req zone=api_limit burst=30 nodelay;

    # 安全 Headers
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";
    add_header Permissions-Policy     "geolocation=()";

    # ── API 路由 ───────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://rag_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Trace-ID        $request_id;   # 注入 Trace-ID

        # SSE 流式支持（禁用缓冲，允许 token 级实时推送）
        proxy_buffering    off;
        proxy_cache        off;

        # 负载均衡健康：后端失败时重试其他节点
        proxy_next_upstream     error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
    }

    # ── Prometheus /metrics 路由（可选：仅内网访问）────────────────────────────
    location /metrics {
        # 生产环境限制只允许内网访问，防止指标泄露
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 127.0.0.1;
        deny  all;

        proxy_pass         http://rag_backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── 健康检查（对 LB 探针不计流量、不记日志）──────────────────────────────
    location = /health {
        proxy_pass        http://rag_backend/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header  Connection "";
        access_log        off;
    }

    location = /readiness {
        proxy_pass        http://rag_backend/api/v1/readiness;
        proxy_http_version 1.1;
        proxy_set_header  Connection "";
        access_log        off;
    }

    # ── 错误页面 ───────────────────────────────────────────────────────────────
    error_page 502 503 504 /50x.json;
    location = /50x.json {
        default_type application/json;
        return 502 '{"success":false,"error":"Service temporarily unavailable","code":502}';
    }
}
